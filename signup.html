<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - ShopWave</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<style>
/* ================= AUTH PAGE DESIGN ================= */
body {
  background: linear-gradient(135deg, #131921, #232f3e);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.form-container {
  background: #fff;
  width: 380px;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
}

.form-container h2 {
  margin-bottom: 20px;
  color: #131921;
}

.form-container input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #ddd;
  border-radius: 6px;
  outline: none;
  transition: 0.2s;
}

.form-container input:focus {
  border-color: #ff9900;
  box-shadow: 0 0 5px rgba(255,153,0,0.4);
}

.form-container button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #ff9900;
  border: none;
  color: #fff;
  font-size: 16px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

.form-container button:hover {
  background: #e68900;
}

.form-container p {
  margin-top: 15px;
  font-size: 14px;
}

.form-container a {
  color: #ff9900;
  text-decoration: none;
  font-weight: bold;
}

.form-container a:hover {
  text-decoration: underline;
}
</style>

</head>

<body>

<div class="form-container">

  <h2>Create Your Account</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email Address">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signupUser()">Sign Up</button>

  <p>Already have an account? <a href="user-login.html">Login</a></p>

</div>

<!-- Scripts -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
