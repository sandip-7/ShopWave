<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShopWave - Modern E-Commerce</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ================= TOP NAV ================= -->
<header class="topbar">

  <div class="logo">ShopWave</div>

  <div class="search-box">
    <input type="text" placeholder="Search products...">
    <button>🔍</button>
  </div>

  <div class="nav-links">
    <a href="signup.html">Signup</a>
    <a href="user-login.html">Login</a>
    <a href="admin-login.html">Admin</a>
  </div>

</header>

<!-- ================= CATEGORY BAR ================= -->
<nav class="categories">
  <span>Home</span>
  <span>Electronics</span>
  <span>Fashion</span>
  <span>Beauty</span>
  <span>Sports</span>
  <span>Books</span>
  <span>Groceries</span>
</nav>

<!-- ================= HERO ================= -->
<section class="hero">
  <h1>Big Deals Today 🔥</h1>
  <p>Up to 70% OFF on selected products</p>
  <a href="pages/admin-products.html" class="btn">Shop Now</a>
</section>

<!-- ================= PRODUCTS ================= -->
<section class="section">
  <h2>Trending Products</h2>

  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h3>Smart Watch</h3>
      <p class="price">₹1999</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h3>Headphones</h3>
      <p class="price">₹999</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h3>Shoes</h3>
      <p class="price">₹1499</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h3>Backpack</h3>
      <p class="price">₹799</p>
    </div>

  </div>
</section>

<!-- ================= FOOTER ================= -->
<footer>
  <p>© 2026 ShopWave. All rights reserved.</p>
</footer>

</body>
</html>
