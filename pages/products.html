<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - ShopWave Products</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<!-- ================= TOPBAR ================= -->
<header class="topbar">

  <!-- LEFT: ACTION ICONS -->
  <div class="left-actions">
    <a href="cart.html" title="Cart">🛒</a>
    <a href="wishlist.html" title="Wishlist">❤️</a>
    <a href="profile.html" title="Profile">👤</a>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- CENTER: LOGO + NAV -->
  <div class="center-nav">

    <div class="logo">ShopWave Admin</div>

    <nav class="nav-links">
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="admin-product.html">Products</a>
      <a href="admin-orders.html">Orders</a>
      <a href="admin-users.html">Users</a>
    </nav>

  </div>

  <!-- RIGHT: SEARCH -->
  <div class="search-box">
    <input type="text" id="search" placeholder="Search products...">
  </div>

</header>


<!-- ================= MAIN ================= -->
<main>

  <section style="padding:20px 30px;">
    <h2>Product Management</h2>
    <p style="color:#aaa;">Manage your store products</p>
  </section>

  <section style="padding:0 30px; display:flex; gap:10px; flex-wrap:wrap;">
    <button onclick="openAddProduct()" class="primary-btn">+ Add Product</button>
    <button onclick="loadProducts()" class="secondary-btn">Refresh</button>
  </section>

  <!-- PRODUCT LIST -->
  <div id="productList" class="product-grid"></div>

  <!-- PAGINATION -->
  <div id="pagination" class="pagination"></div>

</main>


<!-- ================= SCRIPTS ================= -->
<script src="../js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/wishlist.js"></script>

<script>

let products = [];
let currentPage = 1;
const perPage = 8;

/* ================= LOAD ================= */
async function loadProducts() {
  const res = await api("getProducts");

  if (!res.success) {
    alert("Failed to load products");
    return;
  }

  products = res.products;
  renderProducts();
  renderPagination();
}

/* ================= RENDER ================= */
function renderProducts() {
  const start = (currentPage - 1) * perPage;
  const list = products.slice(start, start + perPage);

  document.getElementById("productList").innerHTML =
    list.map(p => `
      <div class="product-card">

        <div class="product-img">
          <img src="${p.image}" onerror="this.src='https://via.placeholder.com/200'">
          ${p.trending === "true" ? `<span class="badge">🔥 Trending</span>` : ""}
        </div>

        <div class="product-body">
          <h3>${p.name}</h3>
          <p class="price">₹${p.price}</p>

          <p style="color:#aaa;font-size:12px;">
            Stock: ${p.stock || 0}
          </p>

          <!-- ================= STOCK CONTROL ================= -->
          <div style="margin:10px 0;">
            <label style="font-size:12px;color:#aaa;">Set Quantity</label>
            <input type="number" id="qty_${p.id}" value="1" min="1"
              style="width:100%;padding:6px;border-radius:6px;border:none;background:#1a1a1f;color:white;">
          </div>

          <!-- ================= ACTIONS ================= -->
          <div class="product-actions">

            <button onclick="addToCart('${p.id}')">
              🛒 Add Cart
            </button>

            <button onclick="addToWishlist('${p.id}')">
              ❤️ Wishlist
            </button>

            <button onclick="editProduct('${p.id}')">
              ✏ Edit
            </button>

            <button onclick="deleteProduct('${p.id}')">
              ❌ Delete
            </button>

          </div>

        </div>

      </div>
    `).join("");
}

/* ================= PAGINATION ================= */
function renderPagination() {
  const pages = Math.ceil(products.length / perPage);

  document.getElementById("pagination").innerHTML =
    Array.from({length: pages}, (_, i) => `
      <button onclick="changePage(${i+1})">${i+1}</button>
    `).join("");
}

function changePage(page) {
  currentPage = page;
  renderProducts();
}

/* ================= ADMIN FUNCTIONS ================= */
function openAddProduct() {
  alert("Add Product Modal coming next step 🚀");
}

function editProduct(id) {
  alert("Edit Product: " + id);
}

function deleteProduct(id) {
  if (confirm("Delete this product?")) {
    alert("Deleted: " + id);
  }
}

/* ================= INIT ================= */
loadProducts();

</script>

</body>
</html>
